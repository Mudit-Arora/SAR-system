<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAR Operator - Live Transcript</title>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: #131a26;
      --panel-2: #1a2433;
      --border: #243047;
      --text: #e6edf6;
      --muted: #8a97ad;
      --user: #2563eb;
      --agent: #10b981;
      --accent: #38bdf8;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.3px;
    }
    header h1 span { color: var(--accent); }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s;
    }
    .dot.connected { background: var(--agent); box-shadow: 0 0 8px var(--agent); }
    .dot.disconnected { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .turn {
      display: flex;
      flex-direction: column;
      margin-bottom: 14px;
      max-width: 78%;
      animation: fadeIn 0.18s ease-out;
    }
    .turn.user { align-self: flex-end; margin-left: auto; align-items: flex-end; }
    .turn.assistant { align-self: flex-start; margin-right: auto; align-items: flex-start; }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin: 0 4px 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .turn.user .bubble { background: var(--user); border-bottom-right-radius: 4px; }
    .turn.assistant .bubble { background: var(--panel-2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

    .system {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin: 18px 0;
      position: relative;
    }
    .system span {
      background: var(--bg);
      padding: 0 12px;
      position: relative;
      z-index: 1;
    }
    .system::before {
      content: "";
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--border);
    }
    .empty {
      text-align: center;
      color: var(--muted);
      margin-top: 80px;
      font-size: 14px;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header>
    <h1>SAR Operator <span>&middot; Live Transcript</span></h1>
    <div class="status">
      <span id="statusText">Connecting...</span>
      <span class="dot" id="statusDot"></span>
    </div>
  </header>
  <main id="feed">
    <div class="empty" id="emptyState">Waiting for a call to begin...</div>
  </main>

  <script>
    const feed = document.getElementById("feed");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const emptyState = document.getElementById("emptyState");

    function clearEmpty() {
      if (emptyState && emptyState.parentNode) emptyState.remove();
    }

    function scrollToBottom() {
      feed.scrollTop = feed.scrollHeight;
    }

    function fmtTime(ts) {
      try {
        return new Date(ts).toLocaleTimeString();
      } catch (e) {
        return ts || "";
      }
    }

    function addTurn(role, content, ts) {
      clearEmpty();
      const turn = document.createElement("div");
      turn.className = "turn " + (role === "user" ? "user" : "assistant");
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = (role === "user" ? "Caller" : "Agent") + " \u00b7 " + fmtTime(ts);
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      turn.appendChild(meta);
      turn.appendChild(bubble);
      feed.appendChild(turn);
      scrollToBottom();
    }

    function addSystem(text) {
      clearEmpty();
      const sys = document.createElement("div");
      sys.className = "system";
      const span = document.createElement("span");
      span.textContent = text;
      sys.appendChild(span);
      feed.appendChild(sys);
      scrollToBottom();
    }

    function setStatus(state, text) {
      statusDot.className = "dot " + state;
      statusText.textContent = text;
    }

    let reconnectTimer = null;

    function connect() {
      const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
      const url = proto + "//" + window.location.host + "/transcript";
      const ws = new WebSocket(url);

      ws.onopen = () => setStatus("connected", "Connected");

      ws.onmessage = (event) => {
        let data;
        try { data = JSON.parse(event.data); } catch (e) { return; }
        switch (data.type) {
          case "turn":
            addTurn(data.role, data.content, data.ts);
            break;
          case "call_started":
            addSystem("Call started \u00b7 " + fmtTime(data.ts));
            break;
          case "call_ended":
            addSystem("Call ended \u00b7 " + fmtTime(data.ts));
            break;
          default:
            break;
        }
      };

      ws.onclose = () => {
        setStatus("disconnected", "Disconnected \u2013 reconnecting...");
        if (reconnectTimer) clearTimeout(reconnectTimer);
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onerror = () => ws.close();
    }

    connect();
  </script>
</body>
</html>
